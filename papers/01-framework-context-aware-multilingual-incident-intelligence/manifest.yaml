paper:
  title: "CyberXTalk: A Context-Aware Multilingual Cyber Incident Reporting and Intelligence Framework for Pre-CERT Triage in Low-Resource Digital Economies"
  short_title: "CyberXTalk Pre-CERT Incident Intelligence Framework"
  type: "five-chapter academic paper"
  institution_format: "FUNAAB-compatible five-chapter structure"
  central_thesis: >
    CyberXTalk is a pre-CERT cyber incident intelligence framework designed to transform
    informal, multilingual, human-generated cybercrime narratives into structured,
    actionable intelligence for classification, triage, evidence capture, escalation,
    and response support.

positioning:
  primary_constructs:
    - pre-CERT triage
    - pre-institutional cyber incident reporting
    - human-generated cyber incident narratives
    - narrative-to-intelligence transformation
    - structured incident intelligence objects
    - low-resource multilingual cyber response environments
  boundary_statement: >
    CyberXTalk does not replace CERTs, CSIRTs, SIEMs, SOAR platforms, banking fraud desks,
    law-enforcement cybercrime portals, or institutional incident response teams. It operates
    as a preparatory intelligence layer that improves the quality and usability of incident
    reports before escalation.
  avoid_claims:
    - "CyberXTalk replaces CERTs"
    - "CyberXTalk is a national cybersecurity control system"
    - "CyberXTalk fully supports all African languages"
    - "CyberXTalk is merely a machine learning model"
    - "CyberXTalk processes machine telemetry as its primary data source"
    - "CyberXTalk guarantees downstream institutional response"

