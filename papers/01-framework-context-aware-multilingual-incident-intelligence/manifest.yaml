writing_rules:
  scholarly_register:
    required: true
    description: >
      Write with the authority of a cybersecurity researcher and domain expert.
      Avoid casual, motivational, semi-formal, or blog-like phrasing.
  paragraph_function:
    each_paragraph_must:
      - define a construct
      - position against literature
      - expose a gap
      - justify the artifact
      - establish methodological necessity
      - clarify contribution
      - constrain overclaiming
  banned_phrases:
    - "messy reports"
    - "ordinary victims"
    - "money left my account"
    - "game changer"
    - "AI-powered magic"
  preferred_terms:
    - "informal human-generated cyber incident narratives"
    - "non-expert cybercrime disclosures"
    - "structured incident intelligence objects"
    - "pre-institutional reporting layer"
    - "pre-CERT triage"
    - "narrative-to-intelligence transformation"
    - "low-resource multilingual digital environments"
    - "response coordination"
    - "escalation-ready metadata"

citation_rules:
  style: APA 7th edition
  in_text_required: true
  references_required: true
  minimum_source_quality:
    - peer-reviewed journal articles
    - conference proceedings
    - standards bodies
    - CERT/CSIRT frameworks
    - NIST publications
    - ENISA reports
    - FIRST documentation
    - reputable cybersecurity datasets/reports
  source_priority:
    - scholarly_articles
    - official_standards
    - institutional_reports
    - books
    - reputable_news_only_for_current_africa_cybercrime_context
  avoid:
    - uncited factual claims
    - generic AI-generated references
    - unverifiable sources
    - fake DOIs
    - excessive reliance on blogs

methodology:
  primary_method: Design Science Research
  rationale: >
    CyberXTalk is an artifact developed to address a practical and research-relevant problem:
    transforming informal cyber incident narratives into structured intelligence objects for
    pre-CERT triage and escalation.
  demonstration_method: scenario-based demonstration
  evaluation_orientation:
    - structured-output completeness
    - triage suitability
    - escalation usefulness
    - usability for non-technical reporters
    - multilingual adaptability
    - analyst review suitability

